name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release as (must already exist on the repo)'
        required: true
        default: 'v0.0.0-manual'

permissions:
  contents: write

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest

    # Read-only env mirror of the optional keystore secret. We can check
    # this in step-level `if:` conditions; secrets.* is not allowed there.
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze

      - name: Decode release keystore (optional)
        if: env.HAS_KEYSTORE == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          mkdir -p android/app/keystore
          printf '%s' "$KEYSTORE_B64" | base64 -d > android/app/keystore/release.jks

      - name: Write key.properties (optional)
        if: env.HAS_KEYSTORE == 'true'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=keystore/release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build APK (release, universal)
        run: flutter build apk --release

      - name: Build APKs (release, split-per-abi)
        run: flutter build apk --release --split-per-abi

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage release artifacts
        run: |
          mkdir -p dist
          T="${{ steps.tag.outputs.tag }}"
          cp build/app/outputs/flutter-apk/app-release.apk             "dist/docbook-${T}-universal.apk"
          [ -f build/app/outputs/flutter-apk/app-arm64-v8a-release.apk ]   && cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk   "dist/docbook-${T}-arm64-v8a.apk"   || true
          [ -f build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk ] && cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "dist/docbook-${T}-armeabi-v7a.apk" || true
          [ -f build/app/outputs/flutter-apk/app-x86_64-release.apk ]      && cp build/app/outputs/flutter-apk/app-x86_64-release.apk      "dist/docbook-${T}-x86_64.apk"      || true
          ls -la dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docbook-apks-${{ steps.tag.outputs.tag }}
          path: dist/*.apk
          retention-days: 30

      - name: Generate release notes
        run: |
          T="${{ steps.tag.outputs.tag }}"
          cat > release-notes.md <<EOF
          ## DocBook Mobile $T

          Native Android reader for the DocBook Markdown book repository format.

          ### Install

          Download **\`docbook-${T}-universal.apk\`** below and open it on your Android phone. Modern devices (2019+) can also use the smaller \`arm64-v8a\` variant.

          ### About

          See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for features and the first-run flow. Point it at any GitHub repo with an [\`index.json\`](https://github.com/DiyRex/DocBook/blob/main/AUTHORING.md) at the root.
          EOF

      # Idempotent release publish: if a release already exists for this
      # tag (e.g. from a previously failed run), delete it first so this run
      # creates a clean one. The tag itself is never deleted, so we don't
      # retrigger the workflow.
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          T="${{ steps.tag.outputs.tag }}"
          if gh release view "$T" >/dev/null 2>&1; then
            echo "Release $T already exists — deleting before recreating"
            gh release delete "$T" -y
          fi
          gh release create "$T" \
            --title "$T" \
            --notes-file release-notes.md \
            dist/*.apk
