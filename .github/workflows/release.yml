name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist or will be auto-created)'
        required: true
        default: 'v0.0.0-manual'

permissions:
  contents: write

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze

      # Optional release signing — only kicks in if you've configured the
      # ANDROID_KEYSTORE secret set. Otherwise the APK ships debug-signed
      # (sideloadable on any Android device, just not Play-Store-eligible).
      - name: Decode release keystore
        if: ${{ secrets.ANDROID_KEYSTORE != '' }}
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          mkdir -p android/app/keystore
          echo "$KEYSTORE_B64" | base64 -d > android/app/keystore/release.jks

      - name: Write key.properties
        if: ${{ secrets.ANDROID_KEYSTORE != '' }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=keystore/release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build split-per-abi APKs
        run: flutter build apk --release --split-per-abi

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename APKs with version
        run: |
          mkdir -p dist
          T="${{ steps.tag.outputs.tag }}"
          cp build/app/outputs/flutter-apk/app-release.apk           "dist/docbook-${T}-universal.apk"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "dist/docbook-${T}-arm64-v8a.apk" || true
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "dist/docbook-${T}-armeabi-v7a.apk" || true
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk    "dist/docbook-${T}-x86_64.apk" || true
          ls -la dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docbook-apks-${{ steps.tag.outputs.tag }}
          path: dist/*.apk
          retention-days: 30

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: dist/*.apk
          fail_on_unmatched_files: true
          body: |
            ## DocBook Mobile ${{ steps.tag.outputs.tag }}

            Native Android reader for the DocBook Markdown book repo format.

            ### Install

            Download the **`docbook-${{ steps.tag.outputs.tag }}-universal.apk`** below and open it on your Android phone. If your device is recent (most phones from 2019+), the smaller `arm64-v8a` variant works too.

            ### What's inside

            See the [README](https://github.com/DiyRex/DocBook-Mobile-App/blob/main/README.md) for features and setup. After install, point the app at any GitHub repo with an [`index.json`](https://github.com/DiyRex/DocBook/blob/main/AUTHORING.md) at the root.
